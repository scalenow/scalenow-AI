<ng-template #optionTemplate let-item>
    <div>ID: {{ item.id }}</div>
    <div>Name: {{ item.name }}</div>
    <div>Project: {{ item.project }}</div>
    <div>Time: {{ item.start_time }}</div>
    <div>Date: {{ item.start_date }}</div>
    <div *ngIf="item.frequency">Frequency: {{ item.frequency }}</div>
</ng-template>
